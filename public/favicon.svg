<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="g" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff8ec8"/>
      <stop offset="100%" stop-color="#ff69b4"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <circle cx="50" cy="50" r="30" fill="url(#g)" filter="url(#glow)"/>
  <circle cx="25" cy="30" r="8" fill="#a78bfa" opacity="0.7" filter="url(#glow)"/>
  <circle cx="75" cy="35" r="10" fill="#67e8f9" opacity="0.6" filter="url(#glow)"/>
  <circle cx="35" cy="75" r="7" fill="#fbbf24" opacity="0.6" filter="url(#glow)"/>
  <line x1="50" y1="50" x2="25" y2="30" stroke="#a78bfa" stroke-width="1.5" opacity="0.4"/>
  <line x1="50" y1="50" x2="75" y2="35" stroke="#67e8f9" stroke-width="1.5" opacity="0.4"/>
  <line x1="50" y1="50" x2="35" y2="75" stroke="#fbbf24" stroke-width="1.5" opacity="0.4"/>
</svg>